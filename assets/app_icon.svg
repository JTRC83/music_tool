<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#eff9ea"/>
      <stop offset="38%" stop-color="#93d26c"/>
      <stop offset="72%" stop-color="#17351f"/>
      <stop offset="100%" stop-color="#07140d"/>
    </radialGradient>
    <linearGradient id="glass" x1="12%" y1="8%" x2="88%" y2="95%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.74"/>
      <stop offset="34%" stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="72%" stop-color="#102918" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="rim" x1="16%" y1="6%" x2="84%" y2="96%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="28%" stop-color="#dfffd0" stop-opacity="0.58"/>
      <stop offset="58%" stop-color="#68d238" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#051008" stop-opacity="0.78"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="34" stdDeviation="38" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <filter id="logoShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <clipPath id="squircle">
      <rect x="64" y="64" width="896" height="896" rx="220" ry="220"/>
    </clipPath>
  </defs>

  <rect width="1024" height="1024" fill="none"/>
  <g filter="url(#softShadow)">
    <rect x="64" y="64" width="896" height="896" rx="220" fill="url(#bgGlow)"/>
    <rect x="64" y="64" width="896" height="896" rx="220" fill="url(#glass)"/>
    <rect x="74" y="74" width="876" height="876" rx="210" fill="none" stroke="url(#rim)" stroke-width="20"/>
  </g>

  <g clip-path="url(#squircle)">
    <circle cx="256" cy="180" r="310" fill="#ffffff" opacity="0.24"/>
    <circle cx="840" cy="876" r="420" fill="#000000" opacity="0.20"/>
    <path d="M112 316 C250 210, 423 162, 628 172 C776 179, 900 225, 964 286 L964 64 L112 64 Z" fill="#ffffff" opacity="0.20"/>
    <path d="M126 724 C270 834, 472 892, 680 850 C802 826, 906 770, 960 708 L960 960 L126 960 Z" fill="#07140d" opacity="0.18"/>
  </g>

  <g filter="url(#logoShadow)">
    <circle cx="512" cy="512" r="356" fill="#ffffff" opacity="0.16"/>
    <image href="logomusictool.png" x="172" y="172" width="680" height="680" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <ellipse cx="354" cy="256" rx="214" ry="82" fill="#ffffff" opacity="0.18" transform="rotate(-22 354 256)"/>
  <circle cx="744" cy="250" r="18" fill="#ffffff" opacity="0.74"/>
  <circle cx="782" cy="296" r="9" fill="#cfff91" opacity="0.82"/>
